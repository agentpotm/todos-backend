server.port=${PORT:3000}

# Database — set DATABASE_URL as a JDBC URL:
# jdbc:postgresql://localhost:5432/todos_dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/todos_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate — create/update schema automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-must-be-32-chars-min}
# Access token TTL in milliseconds (default 15 minutes)
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
# Refresh token TTL in days (default 30 days)
app.jwt.refresh-expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:30}

# Disable Spring Security's default login page
spring.security.user.name=disabled
spring.security.user.password=disabled
